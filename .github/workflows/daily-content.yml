name: Daily Blog Post

on:
  schedule:
    # 매일 KST 07:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install sharp

      - name: Generate daily blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: node scripts/daily-post.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add daily blog post: $(date +%Y-%m-%d)"
          git push

      - name: Ping Google Sitemap
        if: success()
        run: curl -s "https://www.google.com/ping?sitemap=https://toolkio.com/sitemap.xml" || true
