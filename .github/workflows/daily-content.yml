name: Daily Blog Post

on:
  schedule:
    # 매일 KST 07:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      post_count:
        description: '생성할 포스트 수'
        required: false
        default: '5'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install sharp

      - name: Notify Telegram (Start)
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚀 [Toolkio] 블로그 자동 포스팅 시작 (5개)..."

      - name: Generate daily blog posts
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POST_COUNT: ${{ github.event.inputs.post_count || '5' }}
        run: node scripts/daily-post.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add daily blog post: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push

      - name: Notify Telegram (Success)
        if: success()
        run: |
          POST_SLUGS="${{ steps.generate.outputs.POST_SLUGS }}"
          POST_COUNT="${{ steps.generate.outputs.POST_COUNT }}"
          TOTAL_COUNT="${{ github.event.inputs.post_count || '5' }}"
          if [ -z "$POST_SLUGS" ]; then
            MSG="✅ [Toolkio] 자동 포스팅 완료 (변경사항 없음)"
          else
            LINKS=""
            IFS=',' read -ra SLUGS <<< "$POST_SLUGS"
            for i in "${!SLUGS[@]}"; do
              NUM=$((i + 1))
              LINKS="${LINKS}
          ${NUM}. https://toolkio.com/blog/${SLUGS[$i]}"
            done
            if [ "$POST_COUNT" != "$TOTAL_COUNT" ]; then
              MSG="⚠️ [Toolkio] ${POST_COUNT}/${TOTAL_COUNT}개 포스트 발행 (일부 실패)${LINKS}"
            else
              MSG="✅ [Toolkio] ${POST_COUNT}개 포스트 발행!${LINKS}"
            fi
          fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MSG"

      - name: Notify Telegram (Failure)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ [Toolkio] 자동 포스팅 실패! GitHub Actions 로그를 확인하세요."
