name: Daily Blog Post

on:
  schedule:
    # 매일 KST 07:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install sharp

      - name: Notify Telegram (Start)
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚀 [Toolkio] 블로그 자동 포스팅 시작..."

      - name: Generate daily blog post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/daily-post.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add daily blog post: $(date +%Y-%m-%d)"
          git push

      - name: Ping Google Sitemap
        if: success()
        run: curl -s "https://www.google.com/ping?sitemap=https://toolkio.com/sitemap.xml" || true

      - name: Notify Telegram (Success)
        if: success()
        run: |
          POST_SLUG="${{ steps.generate.outputs.POST_SLUG }}"
          POST_TITLE="${{ steps.generate.outputs.POST_TITLE }}"
          if [ -z "$POST_SLUG" ]; then
            MSG="✅ [Toolkio] 자동 포스팅 완료 (변경사항 없음)"
          else
            MSG="✅ [Toolkio] 새 포스트 발행!
          📝 ${POST_TITLE}
          🔗 https://toolkio.com/blog/${POST_SLUG}"
          fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MSG"

      - name: Notify Telegram (Failure)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ [Toolkio] 자동 포스팅 실패! GitHub Actions 로그를 확인하세요."
